{% extends "base.html" %}

{% block title %}Record Sale{% endblock %}

{% block content %}
<h1>💰 Record a Sale</h1>

<form id="saleForm">
    <div class="form-group">
        <label for="productSelect">Select Product *</label>
        <select id="productSelect" required>
            <option value="">-- Choose a product --</option>
        </select>
        <small id="stockInfo" class="stock-info"></small>
    </div>
    
    <div class="form-group">
        <label for="quantitySold">Quantity Sold *</label>
        <input type="number" id="quantitySold" min="1" required>
    </div>
    
    <div class="form-group">
        <label for="paymentMethod">Payment Method *</label>
        <select id="paymentMethod" required>
            <option value="">-- Select payment method --</option>
        </select>
    </div>
    
    <div class="form-group" id="paybillGroup" style="display:none;">
        <label for="paybillSelect">Paybill</label>
        <select id="paybillSelect">
            <option value="">-- Select paybill --</option>
        </select>
    </div>
    
    <div class="sale-preview" id="salePreview">
        <h3>Sale Preview</h3>
        <p>Revenue: <span id="previewRevenue">$0.00</span></p>
        <p>Profit: <span id="previewProfit">$0.00</span></p>
    </div>
    
    <div class="form-actions">
        <button type="submit" class="btn-primary">Complete Sale</button>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/record_sale.js') }}"></script>
{% endblock %}
