{% extends "base.html" %}

{% block title %}Inventory{% endblock %}

{% block content %}
<h1>📋 Product Inventory</h1>

<div class="filters">
    <input type="text" id="searchInput" placeholder="Search by product name..." oninput="filterProducts()">
    <!-- Type-to-search category with autocomplete -->
    <input type="text" id="categoryFilter" list="categoryOptions"
           placeholder="Filter by category..." oninput="filterProducts()">
    <datalist id="categoryOptions"></datalist>
</div>

<table id="inventoryTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Buying Price</th>
            <th>Selling Price</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="productTableBody"></tbody>
</table>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/inventory.js') }}"></script>
{% endblock %}
